# Training configuration.
# All values here represent the 1.6B-parameter GPT target.
# Override per-experiment via configs/profiles/ or CLI --log-level.

model:
  n_layer:    24
  n_embd:     2048
  n_head:     16
  n_kv_heads: 8        # grouped-query attention (GQA): 16 Q / 8 KV heads
  block_size: 2048     # context window (tokens); must match tokenisation.block_size
  vocab_size: 100277   # cl100k_base vocabulary
  dropout:    0.0      # disabled for pretraining; enable only for fine-tuning

training:
  # ── Batch / accumulation ────────────────────────────────────────── #
  batch_size:   4      # sequences per micro-forward-backward pass
  accum_steps:  32     # gradient accumulation → effective batch = 128 sequences
                       # = 128 × 2048 = 262 144 tokens/step

  # ── Schedule ────────────────────────────────────────────────────── #
  max_steps:     10000
  warmup_steps:  500
  lr_max:        3.0e-4
  lr_min:        3.0e-5

  # ── Regularisation ──────────────────────────────────────────────── #
  weight_decay:  0.1
  grad_clip:     1.0

  # ── Reproducibility ─────────────────────────────────────────────── #
  seed: 42

  # ── Logging & checkpointing ─────────────────────────────────────── #
  log_interval:            10     # log every N weight-update steps
  eval_interval:           500    # reserved for Stage 7 eval integration
  checkpoint_interval:     500    # write .safetensors every N steps
  keep_last_n_checkpoints: 3      # prune older checkpoints automatically
